<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App Store - macOS Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        .mac-blur { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(40px) saturate(210%); -webkit-backdrop-filter: blur(40px) saturate(210%); }
        .sidebar { background: rgba(240, 240, 240, 0.5); border-right: 1px solid rgba(0,0,0,0.1); }
        .app-card { background: rgba(255, 255, 255, 0.4); border: 1px solid rgba(255,255,255,0.5); transition: all 0.2s ease; }
        .app-card:hover { background: rgba(255, 255, 255, 0.7); transform: scale(1.02); }
        .traffic-light { width: 12px; height: 12px; border-radius: 50%; border: 0.5px solid rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-[#007AFF] bg-[url('https://help.apple.com/assets/650090F16688B774E90B050B/650090F74E07B7F7D208AF0F/en_US/e188998877d54400a402377823f6631e.png')] bg-cover bg-center h-screen flex items-center justify-center p-0 md:p-10 overflow-hidden">

    <div x-data="{ 
        search: '',
        tab: 'all',
        apps: [],
        loading: true,
        async init() {
            try {
                // Fetching the ACTUAL logic/data from xyzarco's source
                const res = await fetch('https://xyzarco.github.io/app/static/json/apps.json');
                const data = await res.json();
                this.apps = data;
                this.loading = false;
            } catch (e) {
                console.error('Error fetching data');
            }
        },
        install(url) {
            // Native iOS Installer Logic
            window.location.href = `itms-services://?action=download-manifest&url=${url}`;
        }
    }" class="mac-blur w-full h-full md:w-[1000px] md:h-[700px] md:rounded-2xl shadow-2xl flex flex-col md:flex-row overflow-hidden border border-white/30">

        <aside class="sidebar w-full md:w-64 flex flex-col p-4 md:pt-6">
            <div class="hidden md:flex gap-2 mb-8 ml-2">
                <div class="traffic-light bg-[#FF5F57]"></div>
                <div class="traffic-light bg-[#FEBC2E]"></div>
                <div class="traffic-light bg-[#28C840]"></div>
            </div>

            <nav class="flex md:flex-col gap-1 overflow-x-auto no-scrollbar">
                <button @click="tab = 'all'" :class="tab === 'all' ? 'bg-blue-500 text-white' : 'hover:bg-black/5'" class="px-3 py-1.5 rounded-lg text-sm font-medium transition text-left flex-1 md:flex-none">All Apps</button>
                <button @click="tab = 'Ready'" :class="tab === 'Ready' ? 'bg-blue-500 text-white' : 'hover:bg-black/5'" class="px-3 py-1.5 rounded-lg text-sm font-medium transition text-left flex-1 md:flex-none">Signed</button>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col h-full overflow-hidden">
            <header class="p-6 md:p-8 flex items-center justify-between">
                <h1 class="text-3xl font-bold text-gray-900 tracking-tight">App Store</h1>
                <input x-model="search" type="text" placeholder="Search" class="bg-black/10 border-none rounded-md px-3 py-1 text-sm focus:ring-2 focus:ring-blue-400 w-32 md:w-48">
            </header>

            <div class="flex-1 overflow-y-auto px-6 md:px-8 pb-10">
                <div x-show="loading" class="flex justify-center py-20 text-gray-500">Loading data from source...</div>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    <template x-for="app in apps.filter(a => (tab === 'all' || a.status === tab) && a.name.toLowerCase().includes(search.toLowerCase()))">
                        <div class="app-card p-4 rounded-2xl flex flex-col items-center text-center">
                            <img :src="app.icon" class="w-20 h-20 rounded-[1.4rem] shadow-lg mb-3 border border-black/5 object-cover">
                            <h3 class="font-bold text-sm text-gray-900 truncate w-full" x-text="app.name"></h3>
                            <p class="text-[10px] text-gray-500 mb-4" x-text="app.version || 'Latest'"></p>
                            
                            <button @click="install(app.link)" class="bg-[#f0f0f7] hover:bg-[#007AFF] hover:text-white text-blue-600 w-20 py-1 rounded-full text-xs font-black transition-all">
                                GET
                            </button>
                        </div>
                    </template>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
