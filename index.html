<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Directory</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-blue: #2f81f7;
            --status-ready: #238636;
            --status-revoked: #da3633;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container { width: 100%; max-width: 500px; }

        header h1 { font-size: 26px; margin-bottom: 20px; cursor: pointer; }

        /* Search & Tabs */
        .search-bar {
            width: 100%;
            padding: 14px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: white;
            margin-bottom: 15px;
            box-sizing: border-box;
            outline: none;
        }

        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            transition: 0.2s;
        }
        .tab.active { background: var(--accent-blue); color: white; border-color: var(--accent-blue); }

        /* App Cards */
        .app-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .app-info { display: flex; align-items: center; gap: 15px; }
        .icon {
            width: 50px;
            height: 50px;
            background: #21262d;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            border: 1px solid var(--border-color);
        }

        .details b { display: block; font-size: 16px; color: var(--text-primary); }
        .details span { font-size: 12px; color: var(--text-secondary); }

        .badge {
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 800;
            display: inline-block;
            margin-bottom: 4px;
        }
        .ready { background: var(--status-ready); color: white; }
        .revoked { background: var(--status-revoked); color: white; }

        .btn-get {
            background: #21262d;
            color: var(--accent-blue);
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid var(--border-color);
            transition: background 0.2s;
        }
        .btn-get:hover { background: #30363d; }

        /* Admin Hidden Panel */
        #admin-panel {
            display: none;
            background: #0d1117;
            padding: 15px;
            border: 1px dashed var(--accent-blue);
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .admin-input { width: 100%; padding: 10px; margin-bottom: 10px; background: #000; border: 1px solid var(--border-color); color: white; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="secret-trigger">Signed Apps</h1>
    </header>

    <div id="admin-panel">
        <input type="text" id="add-name" class="admin-input" placeholder="App Name">
        <input type="text" id="add-dev" class="admin-input" placeholder="Developer Name">
        <input type="text" id="add-url" class="admin-input" placeholder="URL (e.g. itms-services://...)">
        <select id="add-status" class="admin-input">
            <option value="ready">Ready</option>
            <option value="revoked">Revoked</option>
        </select>
        <button onclick="generateSnippet()" style="width:100%; padding:10px; background:var(--accent-blue); border:none; color:white; font-weight:bold; border-radius:5px;">Generate Data</button>
        <code id="output" style="display:block; margin-top:10px; font-size:10px; color:var(--text-secondary); word-break:break-all;"></code>
    </div>

    <input type="text" id="search" class="search-bar" placeholder="Search apps..." oninput="render()">

    <div class="tabs">
        <div class="tab active" data-filter="all" onclick="filter(this)">All</div>
        <div class="tab" data-filter="ready" onclick="filter(this)">Ready</div>
        <div class="tab" data-filter="revoked" onclick="filter(this)">Revoked</div>
    </div>

    <div id="app-list"></div>
</div>

<script>
    // --- DATA ARRAY ---
    // Update the 'url' property here to change where the GET button goes.
    const apps = [
        { name: "Esign", dev: "China Telecom", status: "ready", url: "https://example.com/esign.plist" },
        { name: "Gbox", dev: "Enterprise", status: "ready", url: "itms-services://?action=download-manifest&url=https://example.com/manifest.plist" },
        { name: "TrollStore", dev: "Alfie CG", status: "revoked", url: "#" }
    ];

    let currentTab = 'all';

    function filter(el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        currentTab = el.getAttribute('data-filter');
        render();
    }

    function render() {
        const query = document.getElementById('search').value.toLowerCase();
        const container = document.getElementById('app-list');
        container.innerHTML = '';

        apps.filter(app => {
            const matchesSearch = app.name.toLowerCase().includes(query);
            const matchesTab = currentTab === 'all' || app.status === currentTab;
            return matchesSearch && matchesTab;
        }).forEach(app => {
            container.innerHTML += `
                <div class="app-card">
                    <div class="app-info">
                        <div class="icon">${app.name[0]}</div>
                        <div class="details">
                            <span class="badge ${app.status}">${app.status}</span>
                            <b>${app.name}</b>
                            <span>${app.dev}</span>
                        </div>
                    </div>
                    <a href="${app.url}" class="btn-get">GET</a>
                </div>
            `;
        });
    }

    // --- ADMIN LOGIC ---
    let clickTracker = 0;
    document.getElementById('secret-trigger').onclick = () => {
        clickTracker++;
        if (clickTracker === 5) {
            const pin = prompt("Enter Admin PIN:");
            if (pin === "0000") { // Default PIN
                document.getElementById('admin-panel').style.display = 'block';
            }
        }
    };

    function generateSnippet() {
        const name = document.getElementById('add-name').value;
        const dev = document.getElementById('add-dev').value;
        const url = document.getElementById('add-url').value;
        const status = document.getElementById('add-status').value;
        
        const snippet = `{ name: "${name}", dev: "${dev}", status: "${status}", url: "${url}" },`;
        document.getElementById('output').innerText = snippet;
    }

    // Load initial list
    render();
</script>

</body>
</html>
