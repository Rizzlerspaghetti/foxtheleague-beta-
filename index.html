<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Enterprise Hub</title>
    <style>
        :root {
            --bg-black: #08090a;
            --card-gray: #121418;
            --accent-blue: #2563eb;
            --ready-green: #22c55e;
            --revoked-red: #ef4444;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg-black);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 15px 15px 100px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 450px; }

        /* Header */
        .header {
            background: rgba(25, 28, 35, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 15px;
        }

        /* Search Bar */
        .search-container {
            width: 100%;
            margin-bottom: 20px;
        }

        #appSearch {
            width: 100%;
            padding: 12px 15px;
            background: var(--card-gray);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        /* App Cards */
        .app-card {
            background: var(--card-gray);
            border-radius: 22px;
            padding: 16px;
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            position: relative;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .icon-container { position: relative; margin-right: 15px; }
        .app-icon {
            width: 60px; height: 60px;
            border-radius: 16px;
            background: #1e222a;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }

        .status-badge {
            position: absolute; top: -10px; left: 50%;
            transform: translateX(-50%);
            font-size: 9px; font-weight: 800;
            padding: 2px 8px; border-radius: 5px;
            text-transform: uppercase;
        }
        .status-badge.ready { background: var(--ready-green); }
        .status-badge.revoked { background: var(--revoked-red); }

        .app-details { flex: 1; }
        .app-name { font-size: 16px; font-weight: 600; margin: 0; }
        .app-provider { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

        .get-button {
            background: var(--accent-blue);
            color: white; padding: 8px 20px;
            border-radius: 20px; text-decoration: none;
            font-weight: bold; font-size: 13px;
        }

        /* Nav */
        .bottom-nav {
            position: fixed; bottom: 25px; left: 50%;
            transform: translateX(-50%); width: 90%; max-width: 400px;
            background: rgba(18, 20, 24, 0.85);
            backdrop-filter: blur(20px); border-radius: 35px;
            display: flex; justify-content: space-around; padding: 12px 10px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .nav-item { text-decoration: none; color: var(--text-dim); font-size: 10px; text-align: center; }
        .nav-item.active { color: white; }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <div style="display:flex; align-items:center;">
            <div style="width:30px; height:30px; background:#fbbf24; border-radius:8px; display:flex; align-items:center; justify-content:center; color:black; font-weight:bold; margin-right:10px;">X</div>
            <span style="font-weight:700;">Enterprise Hub</span>
        </div>
        <span>🌙 🇺🇸</span>
    </header>

    <div class="search-container">
        <input type="text" id="appSearch" placeholder="Search apps..." onkeyup="filterApps()">
    </div>

    <div id="appList">
        <div class="app-card">
            <div class="icon-container">
                <span class="status-badge ready">Ready</span>
                <div class="app-icon">📦</div>
            </div>
            <div class="app-details">
                <p class="app-name">Esign - XL Axiata</p>
                <p class="app-provider">XL AXIATA, PT TBK</p>
            </div>
            <a href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/xyzarco/plist/refs/heads/main/esign/plist/xlaxiata.plist" class="get-button">GET</a>
        </div>

        <div class="app-card">
            <div class="icon-container">
                <span class="status-badge revoked">Revoked</span>
                <div class="app-icon">📁</div>
            </div>
            <div class="app-details">
                <p class="app-name">Ksign - Varco</p>
                <p class="app-provider">National Oilwell Varco, Inc.</p>
            </div>
            <a href="#" class="get-button" style="opacity:0.5;">GET</a>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-item active"><div>🏠</div><span>SIGNED</span></a>
    <a href="#" class="nav-item"><div>🔗</div><span>LINKS</span></a>
    <a href="#" class="nav-item"><div>🛡️</div><span>CERTS</span></a>
</nav>

<script>
    function filterApps() {
        let input = document.getElementById('appSearch').value.toLowerCase();
        let cards = document.getElementsByClassName('app-card');
        
        for (let i = 0; i < cards.length; i++) {
            let name = cards[i].querySelector('.app-name').innerText.toLowerCase();
            if (name.includes(input)) {
                cards[i].style.display = "";
            } else {
                cards[i].style.display = "none";
            }
        }
    }
</script>

</body>
</html>
