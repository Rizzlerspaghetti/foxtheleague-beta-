<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Varco - App Store</title>
    
    <link rel="stylesheet" href="https://fastly.jsdelivr.net/npm/vant@3/lib/index.css" />
    <script src="https://fastly.jsdelivr.net/npm/vue@3"></script>
    <script src="https://fastly.jsdelivr.net/npm/vant@3/lib/vant.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --van-primary-color: #007aff; }
        body { background-color: #f7f8fa; -webkit-font-smoothing: antialiased; }
        
        /* Exact Navbar styling */
        .van-nav-bar { background: #007aff !important; }
        .van-nav-bar__title { color: #fff !important; font-weight: 600; }
        
        /* App Card styling to match original */
        .app-item {
            background: #fff;
            margin: 12px;
            padding: 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .app-icon {
            width: 64px;
            height: 64px;
            border-radius: 14px;
            object-fit: cover;
            margin-right: 14px;
            border: 0.5px solid rgba(0,0,0,0.1);
        }
        .install-button {
            background: #f0f0f7;
            color: #007aff;
            border: none;
            padding: 6px 20px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 13px;
        }
        .status-tag {
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }
        .tag-ready { background: #e8f9f0; color: #07c160; }
        .tag-revoked { background: #fff1f0; color: #f5222d; }
    </style>
</head>
<body>

<div id="app">
    <van-nav-bar :title="lang === 'en' ? 'Varco App Store' : 'Toko Aplikasi Varco'" fixed placeholder></van-nav-bar>

    <van-tabs v-model:active="lang" @click-tab="toggleLang" sticky offset-top="46">
        <van-tab title="English" name="en"></van-tab>
        <van-tab title="Indonesian" name="id"></van-tab>
    </van-tabs>

    <van-search v-model="search" :placeholder="lang === 'en' ? 'Search apps...' : 'Cari aplikasi...'" aria-label="Search"></van-search>

    <van-pull-refresh v-model="loading" @refresh="onRefresh">
        <div class="pb-20">
            <template v-for="app in filteredApps" :key="app.name">
                <div class="app-item">
                    <img :src="app.icon" class="app-icon" @error="handleImgError">
                    
                    <div class="flex-1 overflow-hidden">
                        <div class="text-[16px] font-bold text-gray-800 truncate">{{ app.name }}</div>
                        <div class="text-[12px] text-gray-400">v{{ app.version || '1.0' }}</div>
                        <div class="mt-1">
                            <span :class="app.status === 'Ready' ? 'tag-ready' : 'tag-revoked'" class="status-tag">
                                {{ app.status }}
                            </span>
                        </div>
                    </div>

                    <button class="install-button active:opacity-50" @click="doInstall(app.link)">
                        {{ lang === 'en' ? 'GET' : 'DAPAT' }}
                    </button>
                </div>
            </template>

            <van-empty v-if="filteredApps.length === 0" description="No Apps Found" />
        </div>
    </van-pull-refresh>

    <van-tabbar v-model="activeNav" active-color="#007aff">
        <van-tabbar-item icon="apps-o">{{ lang === 'en' ? 'Apps' : 'Aplikasi' }}</van-tabbar-item>
        <van-tabbar-item icon="info-o">{{ lang === 'en' ? 'About' : 'Tentang' }}</van-tabbar-item>
    </van-tabbar>
</div>

<script>
const { createApp, ref, computed, onMounted } = Vue;

createApp({
    setup() {
        const lang = ref('en');
        const search = ref('');
        const activeNav = ref(0);
        const loading = ref(false);
        const appData = ref([]);

        // The core logic to fetch the EXACT data source
        const fetchData = async () => {
            try {
                // Fetching from the original source repo
                const response = await fetch('https://xyzarco.github.io/app/static/json/apps.json');
                appData.value = await response.json();
            } catch (err) {
                vant.Notify({ type: 'danger', message: 'Failed to sync with Varco database' });
            }
        };

        const filteredApps = computed(() => {
            return appData.value.filter(a => 
                a.name.toLowerCase().includes(search.value.toLowerCase())
            );
        });

        const doInstall = (link) => {
            if (!link || link === '#') {
                vant.Dialog.alert({
                    title: 'Notice',
                    message: 'This application is currently under maintenance or revoked.',
                });
                return;
            }
            // The exact ITMS services trigger for iOS
            window.location.href = `itms-services://?action=download-manifest&url=${link}`;
        };

        const onRefresh = async () => {
            await fetchData();
            loading.value = false;
            vant.Toast.success('Updated');
        };

        const toggleLang = (params) => {
            lang.value = params.name;
        };

        const handleImgError = (e) => {
            e.target.src = 'https://xyzarco.github.io/app/static/img/logo.png';
        };

        onMounted(fetchData);

        return {
            lang, search, activeNav, loading, filteredApps,
            doInstall, onRefresh, toggleLang, handleImgError
        };
    }
}).use(vant).mount('#app');
</script>

</body>
</html>
