<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pharloom Dash</title>
    <style>
        :root {
            --void-bg: #0a0a0b;
            --silk-red: #bb0000;
            --pale-white: #e0e0e0;
            --glow-blue: #58b1e8;
        }

        body {
            background-color: var(--void-bg);
            color: var(--pale-white);
            font-family: sans-serif;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 70vh;
            border-bottom: 2px solid var(--silk-red);
            background: linear-gradient(to bottom, #1a1a1d, #0a0a0b);
        }

        canvas {
            display: block;
        }

        .ui-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            pointer-events: none;
        }

        .stats {
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--pale-white);
            text-shadow: 0 0 5px var(--glow-blue);
        }

        .controls-hint {
            padding: 20px;
            text-align: center;
        }

        #restart-btn {
            display: none;
            margin-top: 20px;
            padding: 15px 30px;
            background: transparent;
            border: 2px solid var(--silk-red);
            color: var(--silk-red);
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="ui-overlay">
            <div class="stats">SILK: <span id="score">0</span></div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="controls-hint">
        <h2 id="status-text" style="color: var(--silk-red); margin: 5px 0;">TAP TO JUMP</h2>
        <p style="opacity: 0.6;">Dodge the void. Collect the silk.</p>
        <button id="restart-btn" onclick="resetGame()">Try Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const statusText = document.getElementById('status-text');
        const restartBtn = document.getElementById('restart-btn');

        // Resize canvas
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight * 0.7;

        let score = 0;
        let gameActive = true;
        
        const player = {
            x: 50,
            y: canvas.height - 60,
            width: 30,
            height: 40,
            color: '#e0e0e0',
            dy: 0,
            jumpForce: 12,
            gravity: 0.6,
            grounded: false
        };

        let obstacles = [];
        let particles = [];
        let frame = 0;

        function spawnObstacle() {
            const size = Math.random() * 30 + 20;
            obstacles.push({
                x: canvas.width + 100,
                y: canvas.height - size,
                width: size,
                height: size,
                color: '#1a1a1d',
                speed: 5 + (score / 10)
            });
        }

        function drawPlayer() {
            // Draw a simple "Hornet" shape
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.moveTo(player.x + 15, player.y); // Top of head
            ctx.lineTo(player.x, player.y + 40); // Bottom left
            ctx.lineTo(player.x + 30, player.y + 40); // Bottom right
            ctx.fill();
            
            // Glowing eyes
            ctx.fillStyle = '#000';
            ctx.fillRect(player.x + 8, player.y + 12, 4, 4);
            ctx.fillRect(player.x + 18, player.y + 12, 4, 4);
        }

        function update() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Player Physics
            player.dy += player.gravity;
            player.y += player.dy;

            if (player.y + player.height > canvas.height) {
                player.y = canvas.height - player.height;
                player.dy = 0;
                player.grounded = true;
            } else {
                player.grounded = false;
            }

            drawPlayer();

            // Obstacles
            if (frame % 100 === 0) spawnObstacle();
            
            obstacles.forEach((obs, index) => {
                obs.x -= obs.speed;
                
                // Draw Obstacle (The Void)
                ctx.fillStyle = '#4e9fd1';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#4e9fd1';
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                ctx.shadowBlur = 0;

                // Collision
                if (
                    player.x < obs.x + obs.width &&
                    player.x + player.width > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + player.height > obs.y
                ) {
                    gameOver();
                }

                if (obs.x + obs.width < 0) {
                    obstacles.splice(index, 1);
                    score++;
                    scoreEl.innerText = score;
                }
            });

            frame++;
            requestAnimationFrame(update);
        }

        function gameOver() {
            gameActive = false;
            statusText.innerText = "ASCENDED NO MORE";
            restartBtn.style.display = "block";
        }

        function resetGame() {
            score = 0;
            scoreEl.innerText = "0";
            obstacles = [];
            player.y = canvas.height - 60;
            gameActive = true;
            statusText.innerText = "TAP TO JUMP";
            restartBtn.style.display = "none";
            update();
        }

        // Controls
        const handleJump = (e) => {
            if (e.type === 'touchstart') e.preventDefault();
            if (player.grounded && gameActive) {
                player.dy = -player.jumpForce;
                player.grounded = false;
            }
        };

        window.addEventListener('touchstart', handleJump);
        window.addEventListener('mousedown', handleJump);
        window.addEventListener('keydown', (e) => { if(e.code === 'Space') handleJump(e); });

        update();
    </script>
</body>
</html>
