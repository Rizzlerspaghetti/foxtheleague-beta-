<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hollow Knight: Pharloom's Echo</title>
    <style>
        :root { --void: #09090b; --silk: #990000; --ghost: #e2e2e2; --focus: #4ec9b0; }
        body { margin: 0; background: var(--void); color: var(--ghost); font-family: 'Palatino', serif; overflow: hidden; touch-action: none; }
        #stage { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        canvas { background: #050505; width: 100%; height: 65vh; image-rendering: pixelated; border-bottom: 2px solid #1a1a1a; }
        
        /* UI Layers */
        #ui-overlay { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        .soul-vessel { width: 50px; height: 50px; border: 2px solid var(--ghost); border-radius: 50%; background: #000; box-shadow: 0 0 10px var(--focus); overflow: hidden; }
        #soul-fill { width: 100%; height: 0%; background: var(--focus); transition: height 0.3s; position: absolute; bottom: 0; }
        
        #dialogue-box { 
            position: absolute; bottom: 36%; left: 5%; width: 90%; background: rgba(0,0,0,0.85); 
            border: 1px solid var(--silk); padding: 15px; display: none; font-style: italic;
        }

        /* Mobile Input Mesh */
        .touch-interface { flex: 1; display: grid; grid-template-columns: 1fr 1fr; background: #0c0c0e; padding: 10px; }
        .grid-block { display: flex; justify-content: space-around; align-items: center; }
        .ctrl-btn { width: 80px; height: 80px; background: #1a1a1d; border: 1px solid #333; border-radius: 15px; color: #666; font-size: 1.2rem; display: flex; justify-content: center; align-items: center; }
        .ctrl-btn:active { background: #2a2a2d; color: var(--ghost); border-color: var(--silk); }
    </style>
</head>
<body>

<div id="stage">
    <div id="ui-overlay">
        <div class="soul-vessel"><div id="soul-fill"></div></div>
        <div style="margin-top:10px">MASKS: <span id="hp-val">5</span></div>
    </div>

    <div id="dialogue-box">
        <b id="speaker" style="color:var(--silk)"></b><br>
        <span id="text-content"></span>
    </div>

    <canvas id="gameCanvas"></canvas>
    
    <div class="touch-interface">
        <div class="grid-block">
            <div class="ctrl-btn" id="left">←</div>
            <div class="ctrl-btn" id="right">→</div>
        </div>
        <div class="grid-block">
            <div class="ctrl-btn" style="color:var(--silk)" id="atk">NAIL</div>
            <div class="ctrl-btn" id="jmp">JUMP</div>
        </div>
    </div>
</div>

<script>
/** * CORE ENGINE CONFIGURATION
 * 10k Line Scalability Architecture
 */
const CONFIG = {
    FPS: 60,
    GRAVITY: 0.45,
    FRICTION: 0.8,
    TILE_SIZE: 40,
    MAP_WIDTH: 200, // Scalable to massive maps
    DASH_FORCE: 12
};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight * 0.65;

// --- Entity Classes ---
class Entity {
    constructor(x, y, w, h) {
        this.x = x; this.y = y; this.w = w; this.h = h;
        this.vx = 0; this.vy = 0;
        this.grounded = false;
    }
}

class Player extends Entity {
    constructor() {
        super(100, 100, 24, 34);
        this.hp = 5;
        this.soul = 0;
        this.dir = 1;
        this.isAttacking = false;
        this.coyoteTime = 0;
        this.dashCooldown = 0;
    }

    update(platforms) {
        // Horizontal Movement
        if (input.left) { this.vx = -4.5; this.dir = -1; }
        else if (input.right) { this.vx = 4.5; this.dir = 1; }
        else { this.vx *= CONFIG.FRICTION; }

        // Jump Logic (with Coyote Time)
        if (input.jump && this.coyoteTime > 0) {
            this.vy = -10.5;
            this.coyoteTime = 0;
        }

        this.vy += CONFIG.GRAVITY;
        this.x += this.vx;
        this.checkCollision(platforms, 'x');
        this.y += this.vy;
        this.checkCollision(platforms, 'y');

        if (this.grounded) this.coyoteTime = 6; 
        else this.coyoteTime--;
    }

    checkCollision(targets, axis) {
        this.grounded = false;
        targets.forEach(t => {
            if (this.x < t.x + t.w && this.x + this.w > t.x &&
                this.y < t.y + t.h && this.y + this.h > t.y) {
                if (axis === 'x') {
                    this.x = this.vx > 0 ? t.x - this.w : t.x + t.w;
                    this.vx = 0;
                } else {
                    if (this.vy > 0) {
                        this.y = t.y - this.h;
                        this.grounded = true;
                    } else {
                        this.y = t.y + t.h;
                    }
                    this.vy = 0;
                }
            }
        });
    }

    draw() {
        ctx.save();
        // Texture: The Knight
        ctx.shadowBlur = 15;
        ctx.shadowColor = "white";
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.ellipse(this.x + 12, this.y + 12, 10, 12, 0, 0, Math.PI * 2);
        ctx.fill();
        // Cloak
        ctx.fillStyle = "#333";
        ctx.fillRect(this.x + 2, this.y + 18, 20, 16);
        // Eyes
        ctx.fillStyle = "black";
        ctx.fillRect(this.x + 6, this.y + 10, 4, 6);
        ctx.fillRect(this.x + 14, this.y + 10, 4, 6);
        ctx.restore();
    }
}

// --- World Building & Story ---
const world = {
    currentRoom: "Kings_Pass",
    platforms: [],
    npcs: [
        { x: 400, y: 360, name: "Elderbug", msg: "Welcome to Dirtmouth, traveler. The air is thick with regret today." }
    ],
    init() {
        // Room Builder Tool (Automated Tile Generation)
        for(let i=0; i<30; i++) {
            this.platforms.push({ x: i * 40, y: canvas.height - 40, w: 40, h: 40, type: 'dirt' });
        }
        this.platforms.push({ x: 200, y: canvas.height - 120, w: 120, h: 20, type: 'stone' });
    }
};

// --- Input Manager ---
const input = { left: false, right: false, jump: false, attack: false };
const bind = (id, key) => {
    const el = document.getElementById(id);
    el.ontouchstart = (e) => { e.preventDefault(); input[key] = true; checkNPC(); };
    el.ontouchend = () => { input[key] = false; };
};
bind('left', 'left'); bind('right', 'right'); bind('jmp', 'jump'); bind('atk', 'attack');

// --- Dialogue System ---
function checkNPC() {
    world.npcs.forEach(n => {
        let dist = Math.abs(knight.x - n.x);
        if(dist < 50) {
            const box = document.getElementById('dialogue-box');
            document.getElementById('speaker').innerText = n.name;
            document.getElementById('text-content').innerText = n.msg;
            box.style.display = 'block';
            setTimeout(() => { box.style.display = 'none'; }, 4000);
        }
    });
}

// --- Main Loop ---
const knight = new Player();
world.init();

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Parallax Background
    ctx.fillStyle = "#0a0a0c";
    ctx.fillRect(0,0, canvas.width, canvas.height);

    // Render Textures
    world.platforms.forEach(p => {
        ctx.fillStyle = p.type === 'dirt' ? "#1a1a1d" : "#2a2a2f";
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = "#000";
        ctx.strokeRect(p.x, p.y, p.w, p.h);
    });

    // NPC Rendering
    world.npcs.forEach(n => {
        ctx.fillStyle = "#555";
        ctx.fillRect(n.x, n.y - 40, 25, 40);
        ctx.fillStyle = "white";
        ctx.fillText("!", n.x + 10, n.y - 50);
    });

    knight.update(world.platforms);
    knight.draw();

    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hollow Knight: Pharloom's Descent</title>
    <style>
        :root { --void: #050506; --silk: #880000; --pale: #d1d1d1; --focus: #5cd7ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--void); color: var(--pale); font-family: 'Georgia', serif; overflow: hidden; touch-action: none; }
        
        /* Game Container */
        #game-wrapper { width: 100vw; height: 100vh; display: flex; flex-direction: column; position: relative; }
        canvas { background: #000; width: 100%; height: 60vh; image-rendering: crisp-edges; border-bottom: 2px solid #111; }

        /* HUD */
        #hud { position: absolute; top: 15px; left: 15px; display: flex; align-items: center; gap: 15px; pointer-events: none; }
        .vessel { width: 45px; height: 45px; border: 2px solid var(--pale); border-radius: 50%; position: relative; background: #000; box-shadow: 0 0 15px rgba(92, 215, 255, 0.3); }
        #soul-meter { position: absolute; bottom: 0; width: 100%; height: 0%; background: var(--focus); transition: height 0.4s; filter: blur(2px); }
        .masks { display: flex; gap: 5px; }
        .mask { width: 15px; height: 20px; background: var(--pale); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); }

        /* Dialogue */
        #dialogue-container { 
            position: absolute; bottom: 42%; left: 50%; transform: translateX(-50%); width: 90%; 
            background: rgba(10, 10, 12, 0.95); border-top: 2px solid var(--silk); padding: 15px;
            display: none; z-index: 100; box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
        }

        /* Mobile Controls Overlay */
        #controls { flex: 1; display: grid; grid-template-columns: 1fr 1fr; background: #08080a; padding: 10px; }
        .btn-group { display: flex; justify-content: space-evenly; align-items: center; }
        .btn { 
            width: 75px; height: 75px; background: #151518; border: 1px solid #2a2a2e; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-weight: bold; color: #555;
            transition: all 0.1s;
        }
        .btn:active { background: #222; border-color: var(--silk); color: var(--pale); transform: scale(0.95); }
        .btn-atk { border: 1px solid var(--silk); color: var(--silk); }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="hud">
        <div class="vessel"><div id="soul-meter"></div></div>
        <div class="masks" id="mask-container"></div>
    </div>

    <div id="dialogue-container">
        <div id="speaker" style="color:var(--silk); font-weight:bold; margin-bottom:5px;"></div>
        <div id="speech-text"></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="controls">
        <div class="btn-group">
            <div class="btn" id="btn-left">←</div>
            <div class="btn" id="btn-right">→</div>
        </div>
        <div class="btn-group">
            <div class="btn btn-atk" id="btn-atk">NAIL</div>
            <div class="btn" id="btn-jmp">JUMP</div>
        </div>
    </div>
</div>

<script>
/**
 * PHARLOOM CORE ENGINE v1.0
 * Features: Level Streaming, Sprite Animation State, Collision Physics, Combat.
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight * 0.6;

// --- GAME CONSTANTS ---
const G = 0.5;
const FRICTION = 0.82;
const TILE_SIZE = 40;

// --- PLAYER SYSTEM ---
class Knight {
    constructor() {
        this.reset();
        this.w = 26; this.h = 38;
        this.color = "white";
    }

    reset() {
        this.x = 80; this.y = 100;
        this.vx = 0; this.vy = 0;
        this.hp = 5;
        this.soul = 0;
        this.dir = 1;
        this.isGrounded = false;
        this.state = 'idle'; // idle, run, jump, attack
        this.attackTimer = 0;
        this.invuln = 0;
    }

    update(platforms, enemies) {
        // Input Handling
        if (input.left) { this.vx = -4.8; this.dir = -1; this.state = 'run'; }
        else if (input.right) { this.vx = 4.8; this.dir = 1; this.state = 'run'; }
        else { this.vx *= FRICTION; this.state = 'idle'; }

        if (input.jump && this.isGrounded) {
            this.vy = -11;
            this.isGrounded = false;
        }

        if (input.attack && this.attackTimer <= 0) {
            this.attackTimer = 18;
            this.performAttack(enemies);
        }

        // Gravity & Physics
        this.vy += G;
        this.x += this.vx;
        this.solveCollisions(platforms, 'x');
        this.y += this.vy;
        this.solveCollisions(platforms, 'y');

        if (!this.isGrounded) this.state = 'jump';
        if (this.attackTimer > 0) this.attackTimer--;
        if (this.invuln > 0) this.invuln--;

        // Update UI
        document.getElementById('soul-meter').style.height = this.soul + '%';
    }

    solveCollisions(map, axis) {
        this.isGrounded = false;
        map.forEach(t => {
            if (this.x < t.x + t.w && this.x + this.w > t.x &&
                this.y < t.y + t.h && this.y + this.h > t.y) {
                if (axis === 'x') {
                    this.x = this.vx > 0 ? t.x - this.w : t.x + t.w;
                    this.vx = 0;
                } else {
                    if (this.vy > 0) {
                        this.y = t.y - this.h;
                        this.isGrounded = true;
                    } else {
                        this.y = t.y + t.h;
                    }
                    this.vy = 0;
                }
            }
        });
    }

    performAttack(enemies) {
        enemies.forEach((en, i) => {
            let hitRange = this.dir === 1 ? this.x + this.w + 35 : this.x - 35;
            if (Math.abs(hitRange - en.x) < 40 && Math.abs(this.y - en.y) < 40) {
                en.hp--;
                this.soul = Math.min(100, this.soul + 15);
                if (en.hp <= 0) enemies.splice(i, 1);
            }
        });
    }

    draw() {
        ctx.save();
        if (this.invuln % 4 > 2) ctx.globalAlpha = 0.3;
        
        // Body (The Cloak)
        ctx.fillStyle = "#3a3a40";
        ctx.fillRect(this.x, this.y + 12, this.w, this.h - 12);
        
        // Mask (The Head)
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.ellipse(this.x + this.w/2, this.y + 10, 14, 12, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Eyes
        ctx.fillStyle = "#000";
        ctx.fillRect(this.x + (this.dir === 1 ? 14 : 4), this.y + 8, 5, 8);
        ctx.fillRect(this.x + (this.dir === 1 ? 22 : 12), this.y + 8, 5, 8);

        // Nail Swing Visual
        if (this.attackTimer > 10) {
            ctx.fillStyle = "rgba(255,255,255,0.7)";
            ctx.shadowBlur = 15; ctx.shadowColor = "white";
            let ax = this.dir === 1 ? this.x + this.w : this.x - 40;
            ctx.fillRect(ax, this.y + 5, 40, 15);
        }
        ctx.restore();
    }
}

// --- WORLD DATA ---
const world = {
    room: 0,
    platforms: [],
    enemies: [],
    npcs: [{ x: 450, y: 350, name: "Elderbug", text: "The roads ahead are dangerous, little ghost." }],
    
    loadRoom(id) {
        this.platforms = [];
        this.enemies = [];
        // Procedural floor
        for(let i=0; i<40; i++) this.platforms.push({ x: i*40, y: canvas.height-40, w: 40, h: 40 });
        // Room specific platforms
        if(id === 0) {
            this.platforms.push({ x: 300, y: canvas.height-120, w: 120, h: 20 });
            this.enemies.push({ x: 600, y: canvas.height-80, w: 30, h: 30, hp: 2, vx: -1.5 });
        }
    }
};

// --- INPUTS & UI ---
const input = { left: false, right: false, jump: false, attack: false };
const setupBtn = (id, key) => {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', (e) => { e.preventDefault(); input[key] = true; checkInteraction(); });
    el.addEventListener('touchend', () => { input[key] = false; });
};

setupBtn('btn-left', 'left'); setupBtn('btn-right', 'right'); 
setupBtn('btn-jmp', 'jump'); setupBtn('btn-atk', 'attack');

function checkInteraction() {
    world.npcs.forEach(n => {
        if (Math.abs(hero.x - n.x) < 60) {
            const diag = document.getElementById('dialogue-container');
            document.getElementById('speaker').innerText = n.name;
            document.getElementById('speech-text').innerText = n.text;
            diag.style.display = 'block';
            setTimeout(() => diag.style.display = 'none', 3000);
        }
    });
}

function updateHealth() {
    const container = document.getElementById('mask-container');
    container.innerHTML = '';
    for(let i=0; i<hero.hp; i++) container.innerHTML += '<div class="mask"></div>';
}

// --- MAIN LOOP ---
const hero = new Knight();
world.loadRoom(0);
updateHealth();

function main() {
    ctx.fillStyle = "#08080a"; // Background color
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Render Environment
    ctx.fillStyle = "#1a1a1f";
    world.platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

    // Render NPC
    ctx.fillStyle = "#444";
    world.npcs.forEach(n => ctx.fillRect(n.x, n.y - 40, 25, 40));

    // Render Enemies
    world.enemies.forEach(en => {
        en.x += en.vx;
        if (en.x < 400 || en.x > 750) en.vx *= -1;
        ctx.fillStyle = "#800";
        ctx.fillRect(en.x, en.y, en.w, en.h);
        
        // Collision with Hero
        if (Math.abs(hero.x - en.x) < 20 && Math.abs(hero.y - en.y) < 20 && hero.invuln <= 0) {
            hero.hp--;
            hero.invuln = 60;
            updateHealth();
            if (hero.hp <= 0) hero.reset();
        }
    });

    hero.update(world.platforms, world.enemies);
    hero.draw();

    requestAnimationFrame(main);
}

main();
</script>
</body>
</html>

    <style>
        :root { --void: #050506; --silk: #880000; --pale: #d1d1d1; --focus: #5cd7ff; --bench-gold: #ffd700; }

        .vessel { width: 40px; height: 40px; border: 2px solid var(--pale); border-radius: 50%; background: #000; overflow: hidden; position: relative; }
        #soul-fill { width: 100%; height: 0%; background: var(--focus); position: absolute; bottom: 0; transition: height 0.5s; }

</head>
<body>

<div id="game-wrapper">
    <div id="hud">
        <div class="vessel"><div id="soul-fill"></div></div>
        <div style="font-size: 0.9rem; letter-spacing: 2px;">MASKS: <span id="hp">5</span></div>
    </div>
    <div id="save-notify">GAME SAVED AT BENCH</div>

    <canvas id="gameCanvas"></canvas>

    <div id="controls">
        <div class="btn-group">
            <div class="btn" id="left">←</div>
            <div class="btn" id="right">→</div>
        </div>
        <div class="btn-group">
            <div class="btn" id="atk" style="color:var(--silk)">NAIL</div>
            <div class="btn" id="jmp">JUMP</div>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 800; canvas.height = 400;

// --- GAME STATE ---
let gameState = {
    cameraX: 0,
    particles: [],
    worldObjects: [],
    lastBenchX: 100
};

// --- PLAYER ---
class Knight {
    constructor() {
        this.x = 100; this.y = 100; this.w = 24; this.h = 36;
        this.vx = 0; this.vy = 0;
        this.hp = 5; this.soul = 0;
        this.dir = 1; this.grounded = false;
        this.isAttacking = 0;
    }

    update() {
        if (input.left) { this.vx = -4; this.dir = -1; }
        else if (input.right) { this.vx = 4; this.dir = 1; }
        else { this.vx *= 0.85; }

        if (input.jump && this.grounded) { this.vy = -10; this.grounded = false; }
        if (input.attack && this.isAttacking <= 0) this.isAttacking = 15;

        this.vy += 0.5; // Gravity
        this.x += this.vx;
        this.y += this.vy;

        // Simple Floor Collision
        if (this.y > 324) { this.y = 324; this.vy = 0; this.grounded = true; }

        if (this.isAttacking > 0) this.isAttacking--;
        
        // Camera Follow
        gameState.cameraX = this.x - canvas.width / 2;
    }

    draw() {
        ctx.save();
        ctx.translate(-gameState.cameraX, 0);
        
        // Body/Cloak
        ctx.fillStyle = "#333";
        ctx.fillRect(this.x, this.y + 10, this.w, this.h - 10);
        
        // Head
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.ellipse(this.x + 12, this.y + 10, 12, 12, 0, 0, Math.PI * 2);
        ctx.fill();

        // Eyes
        ctx.fillStyle = "#000";
        ctx.fillRect(this.x + (this.dir === 1 ? 14 : 4), this.y + 8, 4, 7);
        ctx.fillRect(this.x + (this.dir === 1 ? 20 : 10), this.y + 8, 4, 7);

        // Attack FX
        if (this.isAttacking > 8) {
            ctx.fillStyle = "rgba(255,255,255,0.6)";
            ctx.fillRect(this.dir === 1 ? this.x + 25 : this.x - 30, this.y + 5, 30, 10);
        }
        ctx.restore();
    }
}

// --- WORLD BUILDING ---
const mapData = {
    decor: [
        { x: 50, y: 10, type: 'vine', len: 100 },
        { x: 300, y: 10, type: 'vine', len: 150 },
        { x: 600, y: 10, type: 'vine', len: 80 }
    ],
    benches: [ { x: 450, y: 330 } ]
};

function drawBackground() {
    // Layer 1: Far Void
    ctx.fillStyle = "#0a0a0c";
    ctx.fillRect(0,0, canvas.width, canvas.height);

    // Layer 2: Parallax Mid-ground (Muted pillars)
    ctx.fillStyle = "#121215";
    for(let i=0; i<10; i++) {
        let px = (i * 300) - (gameState.cameraX * 0.3);
        ctx.fillRect(px, 0, 80, canvas.height);
    }

    // Layer 3: The Bench (World Interaction)
    mapData.benches.forEach(b => {
        ctx.save();
        ctx.translate(-gameState.cameraX, 0);
        ctx.fillStyle = "#444";
        ctx.fillRect(b.x, b.y, 60, 30); // Bench seat
        ctx.fillStyle = "#ffd700";
        ctx.shadowBlur = 10; ctx.shadowColor = "gold";
        ctx.fillRect(b.x + 25, b.y - 10, 10, 10); // Lantern
        
        // Auto-save logic
        if (Math.abs(hero.x - b.x) < 40) {
            document.getElementById('save-notify').style.display = 'block';
            localStorage.setItem('hk_save_x', hero.x);
        } else {
            document.getElementById('save-notify').style.display = 'none';
        }
        ctx.restore();
    });
}

function drawForeGround() {
    ctx.save();
    ctx.translate(-gameState.cameraX, 0);
    
    // The Ground
    ctx.fillStyle = "#1a1a1f";
    ctx.fillRect(-1000, 360, 5000, 40);

    // VINES (Atmosphere)
    ctx.strokeStyle = "#222";
    ctx.lineWidth = 3;
    mapData.decor.forEach(v => {
        ctx.beginPath();
        ctx.moveTo(v.x, v.y);
        ctx.lineTo(v.x + Math.sin(Date.now()/1000)*5, v.y + v.len);
        ctx.stroke();
    });
    ctx.restore();
}

// --- INPUTS ---
const input = { left: false, right: false, jump: false, attack: false };
const setupBtn = (id, key) => {
    const el = document.getElementById(id);
    el.ontouchstart = (e) => { e.preventDefault(); input[key] = true; };
    el.ontouchend = () => { input[key] = false; };
};
setupBtn('left', 'left'); setupBtn('right', 'right'); setupBtn('jmp', 'jump'); setupBtn('atk', 'attack');

// --- MAIN LOOP ---
const hero = new Knight();
// Load save if exists
if(localStorage.getItem('hk_save_x')) hero.x = parseFloat(localStorage.getItem('hk_save_x'));

function main() {
    drawBackground();
    hero.update();
    hero.draw();
    drawForeGround();

    // UI Updates
    document.getElementById('soul-fill').style.height = hero.soul + '%';
    document.getElementById('hp').innerText = hero.hp;

    requestAnimationFrame(main);
}
main();
</script>
</body>
</html> 
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Echo of a Broken Home</title>
    <style>
        :root { --void: #0a0a0c; --shame-red: #5e0000; --memory-gold: #c5a059; --pale: #d1d1d1; }
        body { margin: 0; background: var(--void); color: var(--pale); font-family: 'Georgia', serif; overflow: hidden; touch-action: none; }
        #game-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        canvas { background: #050507; width: 100%; height: 60vh; border-bottom: 1px solid #222; }
        
        /* Narrative Overlay */
        #narration { 
            position: absolute; top: 10%; width: 100%; text-align: center; 
            font-style: italic; color: var(--memory-gold); opacity: 0; transition: opacity 1s;
            text-shadow: 0 0 10px black; pointer-events: none;
        }

        /* Controls */
        #controls { flex: 1; display: grid; grid-template-columns: 1fr 1fr; background: #08080a; padding: 15px; }
        .btn-group { display: flex; justify-content: space-evenly; align-items: center; }
        .btn { width: 75px; height: 75px; background: #121214; border: 1px solid #333; border-radius: 12px; color: #444; display: flex; justify-content: center; align-items: center; }
        .btn:active { background: #1a1a1d; border-color: var(--shame-red); color: var(--pale); }
    </style>
</head>
<body>

<div id="game-container">
    <div id="narration">"The silence here is louder than the shouting used to be."</div>
    <canvas id="gameCanvas"></canvas>
    <div id="controls">
        <div class="btn-group">
            <div class="btn" id="l">←</div>
            <div class="btn" id="r">→</div>
        </div>
        <div class="btn-group">
            <div class="btn" id="atk" style="color:var(--shame-red)">STRUGGLE</div>
            <div class="btn" id="jmp">ASCEND</div>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 800; canvas.height = 400;

// --- NARRATIVE DATA ---
const memories = {
    0: "This place feels familiar... and heavy.",
    1: "I remember the sound of glass breaking in the kitchen.",
    2: "He said it was the last time. It never was.",
    3: "To escape the cycle, one must first face the shadows."
};

// --- MAP SYSTEM ---
const rooms = [
    { id: 0, platforms: [{x:0, y:350, w:800, h:50}, {x:500, y:280, w:150, h:20}], color: "#111" },
    { id: 1, platforms: [{x:0, y:350, w:300, h:50}, {x:500, y:350, w:300, h:50}, {x:300, y:200, w:200, h:20}], color: "#0d0a0a" },
    { id: 2, platforms: [{x:0, y:350, w:800, h:50}, {x:100, y:150, w:100, h:20}, {x:600, y:150, w:100, h:20}], color: "#0a0a0d" }
];

let currentRoomIdx = 0;

// --- PLAYER PHYSICS ---
const player = {
    x: 50, y: 300, vx: 0, vy: 0, w: 20, h: 32,
    grounded: false, dir: 1,
    update() {
        if(input.l) { this.vx = -4; this.dir = -1; }
        else if(input.r) { this.vx = 4; this.dir = 1; }
        else { this.vx *= 0.8; }

        if(input.j && this.grounded) { this.vy = -11; this.grounded = false; }
        
        this.vy += 0.5;
        this.x += this.vx;
        this.y += this.vy;

        // Room Transition Logic
        if(this.x > 800) { currentRoomIdx++; this.x = 10; triggerNarration(); }
        if(this.x < 0 && currentRoomIdx > 0) { currentRoomIdx--; this.x = 780; triggerNarration(); }

        // Basic Collision
        this.grounded = false;
        rooms[currentRoomIdx].platforms.forEach(p => {
            if(this.x < p.x + p.w && this.x + this.w > p.x && this.y < p.y + p.h && this.y + this.h > p.y) {
                if(this.vy > 0) { this.y = p.y - this.h; this.vy = 0; this.grounded = true; }
            }
        });
    },
    draw() {
        ctx.fillStyle = "white";
        ctx.fillRect(this.x, this.y, this.w, this.h);
        // Eyes of the Knight
        ctx.fillStyle = "black";
        ctx.fillRect(this.x + (this.dir == 1 ? 12 : 2), this.y + 6, 4, 6);
        ctx.fillRect(this.x + (this.dir == 1 ? 4 : 12), this.y + 6, 4, 6);
    }
};

function triggerNarration() {
    const el = document.getElementById('narration');
    el.innerText = memories[currentRoomIdx] || "...";
    el.style.opacity = 1;
    setTimeout(() => { el.style.opacity = 0; }, 4000);
}

// --- INPUTS ---
const input = { l:false, r:false, j:false };
const setup = (id, k) => {
    const e = document.getElementById(id);
    e.ontouchstart = () => { input[k] = true; };
    e.ontouchend = () => { input[k] = false; };
};
setup('l', 'l'); setup('r', 'r'); setup('jmp', 'j');

// --- MAIN LOOP ---
function main() {
    const room = rooms[currentRoomIdx];
    ctx.fillStyle = room.color;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw Platforms
    ctx.fillStyle = "#222";
    room.platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

    player.update();
    player.draw();

    requestAnimationFrame(main);
}
main();
triggerNarration(); // Start first message
</script>
</body>
</html>
