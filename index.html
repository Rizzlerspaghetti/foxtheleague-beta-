<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Directory</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-blue: #2f81f7;
            --status-ready: #238636;
            --status-revoked: #da3633;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        header h1 {
            font-size: 24px;
            margin-bottom: 15px;
        }

        /* Search Input */
        .search-bar {
            width: 100%;
            padding: 12px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        /* Filter Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .tab.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        /* App Cards */
        .app-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .app-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon-placeholder {
            width: 48px;
            height: 48px;
            background: #21262d;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .details b {
            display: block;
            font-size: 16px;
        }

        .details span {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 4px;
            display: inline-block;
        }

        .ready { background: var(--status-ready); }
        .revoked { background: var(--status-revoked); }

        .btn-get {
            background: #21262d;
            color: var(--accent-blue);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid var(--border-color);
        }

        /* Admin Secret Panel */
        #admin-panel {
            display: none;
            padding: 15px;
            border: 1px dashed var(--accent-blue);
            margin-bottom: 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="title-trigger">Signed Apps</h1>
    </header>

    <div id="admin-panel">
        <input type="text" id="add-name" placeholder="App Name" style="width:100%; margin-bottom:5px;">
        <input type="text" id="add-link" placeholder="Link (https://...)" style="width:100%; margin-bottom:5px;">
        <button onclick="generateData()">Get Data Snippet</button>
        <p id="output-code" style="font-size:10px; color:gray; word-break:break-all;"></p>
    </div>

    <input type="text" id="search" class="search-bar" placeholder="Search for apps..." oninput="render()">

    <div class="tabs">
        <div class="tab active" data-type="all" onclick="setTab(this)">All</div>
        <div class="tab" data-type="ready" onclick="setTab(this)">Ready</div>
        <div class="tab" data-type="revoked" onclick="setTab(this)">Revoked</div>
    </div>

    <div id="list"></div>
</div>

<script>
    // 1. DATA: This is where your app information lives
    const apps = [
        { name: "Esign", dev: "Enterprise", status: "ready", url: "#" },
        { name: "TrollStore", dev: "Alfie CG", status: "revoked", url: "#" },
        { name: "Gbox", dev: "Developer", status: "ready", url: "#" }
    ];

    let activeFilter = 'all';

    // 2. LOGIC: Filter and Search
    function setTab(el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        activeFilter = el.getAttribute('data-type');
        render();
    }

    function render() {
        const query = document.getElementById('search').value.toLowerCase();
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = '';

        const filtered = apps.filter(app => {
            const matchesSearch = app.name.toLowerCase().includes(query);
            const matchesTab = activeFilter === 'all' || app.status === activeFilter;
            return matchesSearch && matchesTab;
        });

        filtered.forEach(app => {
            listDiv.innerHTML += `
                <div class="app-card">
                    <div class="app-info">
                        <div class="icon-placeholder">${app.name[0]}</div>
                        <div class="details">
                            <span class="badge ${app.status}">${app.status}</span>
                            <b>${app.name}</b>
                            <span>${app.dev}</span>
                        </div>
                    </div>
                    <a href="${app.url}" class="btn-get">GET</a>
                </div>
            `;
        });
    }

    // 3. ADMIN: Secret Access
    let count = 0;
    document.getElementById('title-trigger').onclick = () => {
        count++;
        if (count === 5) {
            const pass = prompt("Password:");
            if (pass === "123") { // Your secret password
                document.getElementById('admin-panel').style.display = 'block';
            }
        }
    };

    function generateData() {
        const n = document.getElementById('add-name').value;
        const l = document.getElementById('add-link').value;
        document.getElementById('output-code').innerText = `{ name: "${n}", dev: "User", status: "ready", url: "${l}" },`;
    }

    // Initial Load
    render();
</script>

</body>
</html>
