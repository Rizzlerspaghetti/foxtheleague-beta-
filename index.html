<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xyzarco | macOS Hub</title>
    <style>
        /* CSS - The macOS Design System */
        :root {
            --glass: rgba(255, 255, 255, 0.4);
            --border: rgba(255, 255, 255, 0.3);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; }

        body {
            background: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            overflow: hidden;
            color: #1d1d1f;
        }

        /* Top Menu Bar */
        .menu-bar {
            height: 28px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            color: white;
            font-size: 13px;
            font-weight: 500;
            z-index: 1000;
        }

        .menu-left span { margin-right: 15px; cursor: default; }
        .apple-logo { font-size: 16px; margin-right: 10px !important; }

        /* Desktop Area */
        .desktop {
            height: calc(100vh - 28px);
            position: relative;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* macOS Window Styling */
        .window {
            width: 90%;
            max-width: 700px;
            height: 450px;
            background: var(--glass);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            animation: window-open 0.4s ease-out;
        }

        @keyframes window-open {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .title-bar {
            height: 45px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.1);
        }

        .traffic-lights { display: flex; gap: 8px; width: 60px; }
        .dot { height: 12px; width: 12px; border-radius: 50%; }
        .close { background: #ff5f56; }
        .min { background: #ffbd2e; }
        .max { background: #27c93f; }
        .title { flex-grow: 1; text-align: center; font-size: 14px; font-weight: 600; color: #333; margin-right: 60px; }

        /* App List Styling */
        .content { flex-grow: 1; overflow-y: auto; padding: 20px; }
        
        .app-row {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            transition: background 0.2s;
        }

        .app-row:hover { background: rgba(255, 255, 255, 0.5); }

        .app-icon { width: 45px; height: 45px; border-radius: 10px; background: #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .app-details { margin-left: 15px; flex-grow: 1; }
        .app-details h3 { font-size: 15px; margin-bottom: 2px; }
        .app-details p { font-size: 11px; color: #555; }

        .btn-get {
            background: #007aff;
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            transition: opacity 0.2s;
        }
        .btn-get:hover { opacity: 0.8; }

        /* The Dock */
        .dock-wrapper {
            position: fixed;
            bottom: 15px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .dock {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 10px;
            border-radius: 22px;
            border: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        .dock-item {
            width: 50px;
            height: 50px;
            transition: transform 0.2s ease;
            cursor: pointer;
        }

        .dock-item:hover { transform: scale(1.3) translateY(-10px); }
        .dock-item img { width: 100%; height: 100%; }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .window { width: 95%; height: 80vh; }
            .title { display: none; }
        }
    </style>
</head>
<body>

    <div class="menu-bar">
        <div class="menu-left">
            <span class="apple-logo"></span>
            <span style="font-weight: 700;">Finder</span>
            <span>File</span>
            <span>Edit</span>
            <span>View</span>
            <span>Go</span>
        </div>
        <div class="menu-right">
            <span id="date-display">Mon Apr 6</span>
            <span id="clock-display">9:41 AM</span>
        </div>
    </div>

    <div class="desktop">
        <div class="window" id="main-window">
            <div class="title-bar">
                <div class="traffic-lights">
                    <div class="dot close"></div>
                    <div class="dot min"></div>
                    <div class="dot max"></div>
                </div>
                <div class="title">Applications - xyzarco</div>
            </div>
            <div class="content">
                
                <div class="app-row">
                    <img src="https://raw.githubusercontent.com/xyzarco/app/main/icons/esign.png" class="app-icon" onerror="this.src='https://via.placeholder.com/45?text=ES'">
                    <div class="app-details">
                        <h3>E-Sign</h3>
                        <p>Source: xyzarco/plist</p>
                    </div>
                    <a href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/xyzarco/plist/main/Apps/E-Sign.plist" class="btn-get">GET</a>
                </div>

                <div class="app-row">
                    <img src="https://via.placeholder.com/45?text=App" class="app-icon">
                    <div class="app-details">
                        <h3>Cert Info</h3>
                        <p>Repo: esigncert</p>
                    </div>
                    <a href="https://github.com/xyzarco/esigncert" class="btn-get" style="background: #34c759;">CERT</a>
                </div>

                <p style="text-align: center; font-size: 11px; color: #666; margin-top: 20px;">
                    All apps are signed with certificates from <b>esigncert</b> repo.
                </p>

            </div>
        </div>
    </div>

    <div class="dock-wrapper">
        <div class="dock">
            <div class="dock-item" title="Finder"><img src="https://upload.wikimedia.org/wikipedia/commons/c/c9/Finder_Icon_macOS_Big_Sur.png"></div>
            <div class="dock-item" title="Apps"><img src="https://upload.wikimedia.org/wikipedia/commons/6/66/Apple_Store_logo.png"></div>
            <div class="dock-item" title="Certificates"><img src="https://upload.wikimedia.org/wikipedia/commons/0/03/System_Preferences_Icon_macOS_Big_Sur.png"></div>
            <div class="dock-item" onclick="window.location.href='https://github.com/xyzarco'" title="GitHub"><img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"></div>
        </div>
    </div>

    <script>
        // JavaScript - System Functions
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const dateStr = now.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
            
            document.getElementById('clock-display').textContent = timeStr;
            document.getElementById('date-display').textContent = dateStr;
        }

        setInterval(updateClock, 1000);
        updateClock();

        // Simple Close Window simulation
        document.querySelector('.close').addEventListener('click', () => {
            document.getElementById('main-window').style.display = 'none';
        });
    </script>
</body>
</html>
