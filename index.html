<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xyzarco | Live OS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif; }
        body {
            background: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            height: 100vh; overflow: hidden;
        }

        /* Top Bar */
        .menu-bar {
            height: 28px; background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; color: white; font-size: 13px; z-index: 1000;
        }

        /* The Windows */
        .desktop { height: 100vh; padding: 50px; display: flex; gap: 20px; flex-wrap: wrap; }
        
        .window {
            width: 400px; height: 500px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(30px) saturate(180%);
            border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            display: flex; flex-direction: column;
        }

        .title-bar {
            height: 35px; padding: 0 12px; display: flex; align-items: center;
            border-bottom: 0.5px solid rgba(0,0,0,0.1);
        }
        .dots { display: flex; gap: 6px; }
        .dot { width: 11px; height: 11px; border-radius: 50%; }
        .r { background: #ff5f56; } .y { background: #ffbd2e; } .g { background: #27c93f; }
        .title { flex-grow: 1; text-align: center; font-size: 12px; font-weight: 600; margin-right: 35px; }

        /* App List Styling */
        .content { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .app-card {
            background: rgba(255,255,255,0.3); padding: 10px; border-radius: 8px;
            display: flex; align-items: center; margin-bottom: 10px;
        }
        .app-icon { width: 40px; height: 40px; border-radius: 8px; margin-right: 12px; background: #fff; }
        .app-info { flex-grow: 1; }
        .app-info h4 { font-size: 13px; }
        .app-info p { font-size: 10px; color: #444; }
        .btn-install { 
            background: #007aff; color: white; padding: 4px 12px; 
            border-radius: 15px; text-decoration: none; font-size: 11px; font-weight: bold;
        }

        /* Certificate Widget */
        .cert-box { background: #fff; padding: 10px; border-radius: 8px; margin-top: 10px; border: 1px solid #ddd; }
        .status-dot { height: 8px; width: 8px; background: #27c93f; border-radius: 50%; display: inline-block; }

        /* Dock */
        .dock-ctn { position: fixed; bottom: 10px; width: 100%; display: flex; justify-content: center; }
        .dock { background: rgba(255,255,255,0.2); backdrop-filter: blur(20px); padding: 10px; border-radius: 20px; display: flex; gap: 15px; }
        .dock img { width: 45px; transition: 0.2s; cursor: pointer; }
        .dock img:hover { transform: scale(1.3) translateY(-10px); }
    </style>
</head>
<body>

    <div class="menu-bar">
        <div><span style="font-size: 16px;"></span> <b>Finder</b> File Edit View</div>
        <div id="clock">9:41 AM</div>
    </div>

    <div class="desktop">
        <div class="window">
            <div class="title-bar">
                <div class="dots"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div></div>
                <div class="title">App Store</div>
            </div>
            <div class="content" id="app-list">
                <p style="font-size: 12px; text-align: center;">Loading Apps from Plist Repo...</p>
            </div>
        </div>

        <div class="window" style="height: 250px; width: 300px;">
            <div class="title-bar">
                <div class="dots"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div></div>
                <div class="title">Keychain</div>
            </div>
            <div class="content">
                <p style="font-size: 12px;">Active Certificate:</p>
                <div class="cert-box" id="cert-info">
                    <span class="status-dot"></span> <b id="cert-name">Fetching...</b>
                    <p style="font-size: 10px; color: #666; margin-top: 5px;">Linked to esigncert repo</p>
                </div>
            </div>
        </div>
    </div>

    <div class="dock-ctn">
        <div class="dock">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c9/Finder_Icon_macOS_Big_Sur.png">
            <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png">
        </div>
    </div>

    <script>
        // 1. FETCH APPS FROM PLIST REPO
        async function fetchApps() {
            const appList = document.getElementById('app-list');
            try {
                // We fetch the 'Apps' folder from your plist repository
                const response = await fetch('https://api.github.com/repos/xyzarco/plist/contents/Apps');
                const files = await response.json();
                
                appList.innerHTML = ''; // Clear loader

                files.forEach(file => {
                    if (file.name.endsWith('.plist')) {
                        const appName = file.name.replace('.plist', '');
                        const manifestUrl = `https://raw.githubusercontent.com/xyzarco/plist/main/Apps/${file.name}`;
                        
                        appList.innerHTML += `
                            <div class="app-card">
                                <div class="app-icon"></div>
                                <div class="app-info">
                                    <h4>${appName}</h4>
                                    <p>Official Version</p>
                                </div>
                                <a href="itms-services://?action=download-manifest&url=${manifestUrl}" class="btn-install">GET</a>
                            </div>
                        `;
                    }
                });
            } catch (e) {
                appList.innerHTML = '<p style="color:red">Error loading apps.</p>';
            }
        }

        // 2. FETCH CERT INFO FROM ESIGNCERT REPO
        async function fetchCert() {
            try {
                const response = await fetch('https://api.github.com/repos/xyzarco/esigncert/contents');
                const files = await response.json();
                // Look for the .p12 file
                const certFile = files.find(f => f.name.endsWith('.p12'));
                if (certFile) {
                    document.getElementById('cert-name').innerText = certFile.name.replace('.p12', '');
                }
            } catch (e) {
                document.getElementById('cert-name').innerText = "Unknown Cert";
            }
        }

        // Clock Function
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }, 1000);

        // Run on load
        fetchApps();
        fetchCert();
    </script>
</body>
</html>
