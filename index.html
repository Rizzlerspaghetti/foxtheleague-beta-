<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My App Store</title>
    <style>
        :root {
            --bg: #0b0e14;
            --card-bg: #161b22;
            --text: #ffffff;
            --text-dim: #8b949e;
            --ready: #238636;
            --revoked: #da3633;
            --accent: #2f81f7;
            --border: #30363d;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 600px;
            text-align: left;
            margin-bottom: 30px;
        }

        h1 { font-size: 28px; margin-bottom: 5px; }
        .subtitle { color: var(--text-dim); font-size: 14px; }

        /* Search Bar */
        .search-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
        }

        #searchInput {
            width: 100%;
            padding: 12px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
        }

        /* App Cards */
        .app-grid {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .app-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.1s;
        }

        .app-info { display: flex; align-items: center; gap: 15px; }

        .app-icon {
            width: 50px;
            height: 50px;
            background: #21262d;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
        }

        .app-details b { display: block; font-size: 16px; }
        .app-details span { color: var(--text-dim); font-size: 12px; }

        .status-badge {
            font-size: 10px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            margin-bottom: 4px;
            display: inline-block;
        }

        .ready { background: var(--ready); color: white; }
        .revoked { background: var(--revoked); color: white; }

        .get-btn {
            background: #21262d;
            color: var(--accent);
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid var(--border);
        }

        .get-btn:hover { background: var(--border); }
    </style>
</head>
<body>

<header>
    <h1>Signed Apps</h1>
    <p class="subtitle">Explore a curated collection of apps for your device.</p>
</header>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Search apps..." onkeyup="filterApps()">
</div>

<div class="app-grid" id="appGrid">
    <div class="app-card" data-name="Esign">
        <div class="app-info">
            <div class="app-icon">E</div>
            <div class="app-details">
                <span class="status-badge ready">Ready</span>
                <b>Esign - Enterprise</b>
                <span>Developer: Apple Inc.</span>
            </div>
        </div>
        <a href="#" class="get-btn">GET</a>
    </div>

    <div class="app-card" data-name="TrollStore">
        <div class="app-info">
            <div class="app-icon" style="color: #ff9f0a;">T</div>
            <div class="app-details">
                <span class="status-badge revoked">Revoked</span>
                <b>TrollInstallerX</b>
                <span>Developer: Alfie CG</span>
            </div>
        </div>
        <a href="#" class="get-btn">GET</a>
    </div>

    <div class="app-card" data-name="Ksign">
        <div class="app-info">
            <div class="app-icon" style="color: #5856d6;">K</div>
            <div class="app-details">
                <span class="status-badge ready">Ready</span>
                <b>Ksign - Global</b>
                <span>Developer: Khindvn</span>
            </div>
        </div>
        <a href="#" class="get-btn">GET</a>
    </div>
</div>

<script>
    function filterApps() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let cards = document.getElementsByClassName('app-card');
        
        for (let i = 0; i < cards.length; i++) {
            let name = cards[i].getAttribute('data-name').toLowerCase();
            if (name.includes(input)) {
                cards[i].style.display = "flex";
            } else {
                cards[i].style.display = "none";
            }
        }
    }
</script>

</body>
</html>
