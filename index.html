<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        .mac-blur { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); }
        .window-shadow { box-shadow: 0 30px 60px rgba(0,0,0,0.3); }
    </style>
</head>
<body class="bg-[url('https://coolbackgrounds.io/images/backgrounds/white/pure-white-background-85a2a7fd.jpg')] bg-cover h-screen flex items-center justify-center font-sans">

    <div x-data="{ 
        filter: 'all', 
        apps: [
            { name: 'Esign', status: 'Ready', provider: 'XL Axiata', link: 'itms-services://?action=download-manifest&url=...' },
            { name: 'TrollInstallerX', status: 'Revoked', provider: 'Varco', link: '#' },
            { name: 'Ksign', status: 'Ready', provider: 'China Telecom', link: 'itms-services://...' }
        ]
    }" class="w-[900px] h-[600px] mac-blur rounded-xl border border-white/40 window-shadow flex overflow-hidden">
        
        <aside class="w-56 bg-white/30 border-r border-black/10 p-4 flex flex-col">
            <div class="flex gap-2 mb-8">
                <div class="w-3 h-3 rounded-full bg-red-500"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                <div class="w-3 h-3 rounded-full bg-green-500"></div>
            </div>
            
            <nav class="space-y-1">
                <button @click="filter = 'all'" :class="filter === 'all' ? 'bg-blue-500 text-white' : 'hover:bg-black/5'" class="w-full text-left px-3 py-1.5 rounded-md text-sm font-medium transition">All Apps</button>
                <button @click="filter = 'Ready'" :class="filter === 'Ready' ? 'bg-blue-500 text-white' : 'hover:bg-black/5'" class="w-full text-left px-3 py-1.5 rounded-md text-sm font-medium transition">Signed</button>
                <button @click="filter = 'Revoked'" :class="filter === 'Revoked' ? 'bg-blue-500 text-white' : 'hover:bg-black/5'" class="w-full text-left px-3 py-1.5 rounded-md text-sm font-medium transition">Revoked</button>
            </nav>
        </aside>

        <main class="flex-1 p-8 overflow-y-auto">
            <header class="mb-8">
                <h1 class="text-3xl font-bold text-black/80">App Store</h1>
                <p class="text-sm text-black/50">Manage your signed IPA installations</p>
            </header>

            <div class="grid grid-cols-1 gap-4">
                <template x-for="app in apps">
                    <div x-show="filter === 'all' || filter === app.status" class="bg-white/50 border border-white/60 p-4 rounded-lg flex items-center justify-between hover:bg-white/80 transition shadow-sm">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-gradient-to-br from-blue-400 to-indigo-600 rounded-xl shadow-inner flex items-center justify-center text-white font-bold text-xl" x-text="app.name[0]"></div>
                            <div>
                                <h3 class="font-bold text-gray-800" x-text="app.name"></h3>
                                <p class="text-xs text-gray-500" x-text="app.provider"></p>
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-4">
                            <span :class="app.status === 'Ready' ? 'text-green-600 bg-green-100' : 'text-red-600 bg-red-100'" class="text-[10px] uppercase font-bold px-2 py-0.5 rounded" x-text="app.status"></span>
                            <a :href="app.link" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-1 rounded-full text-sm font-bold shadow-sm transition">GET</a>
                        </div>
                    </div>
                </template>
            </div>
        </main>
    </div>
</body>
</html>
