<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise App Directory</title>
    <style>
        :root {
            --bg: #010409;
            --card: #161b22;
            --border: #30363d;
            --accent: #2f81f7;
            --success: #238636;
            --error: #da3633;
            --text: #f0f6fc;
            --dim: #8b949e;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container { width: 100%; max-width: 480px; }

        /* Header & Search */
        header h1 { font-size: 28px; margin-bottom: 8px; font-weight: 700; }
        .search-box {
            width: 100%;
            padding: 14px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            margin: 20px 0;
            box-sizing: border-box;
            outline: none;
        }

        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab.active { background: var(--accent); border-color: var(--accent); color: white; }

        /* App Cards */
        .app-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            transition: transform 0.2s;
        }
        .app-card:active { transform: scale(0.97); }

        .app-meta { display: flex; align-items: center; gap: 14px; }
        .app-icon {
            width: 54px;
            height: 54px;
            background: linear-gradient(145deg, #1f242c, #0d1117);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 22px;
            border: 1px solid var(--border);
        }

        .info b { display: block; font-size: 16px; margin-bottom: 2px; }
        .info span { font-size: 12px; color: var(--dim); }

        .status {
            font-size: 9px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            margin-bottom: 4px;
            display: inline-block;
        }
        .status-signed { background: var(--success); color: white; }
        .status-revoked { background: var(--error); color: white; }

        .get-btn {
            background: #21262d;
            color: var(--accent);
            text-decoration: none;
            padding: 8px 22px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
            border: 1px solid var(--border);
        }

        /* Admin Section */
        #adminArea {
            display: none;
            background: #0d1117;
            border: 1px dashed var(--accent);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .admin-input { width: 100%; padding: 8px; margin: 5px 0; background: #000; border: 1px solid var(--border); color: white; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="mainTitle">Apps</h1>
        <div id="adminArea">
            <input type="text" id="aName" placeholder="App Name" class="admin-input">
            <input type="text" id="aDev" placeholder="Developer" class="admin-input">
            <input type="text" id="aLink" placeholder="itms-services://..." class="admin-input">
            <select id="aStatus" class="admin-input">
                <option value="signed">Signed</option>
                <option value="revoked">Revoked</option>
            </select>
            <button onclick="genApp()" style="width:100%; padding:10px; background:var(--accent); border:none; border-radius:5px; color:white; font-weight:bold;">Generate JSON</button>
            <pre id="jsonOutput" style="font-size:10px; color:var(--dim); white-space: pre-wrap;"></pre>
        </div>
    </header>

    <input type="text" class="search-box" id="search" placeholder="Search apps..." oninput="updateUI()">

    <div class="tabs">
        <div class="tab active" data-filter="all" onclick="setFilter(this)">All</div>
        <div class="tab" data-filter="signed" onclick="setFilter(this)">Signed</div>
        <div class="tab" data-filter="revoked" onclick="setFilter(this)">Revoked</div>
    </div>

    <div id="appList"></div>
</div>

<script>
    // --- DATABASE ---
    // Edit this array to add/remove apps
    const appData = [
        { name: "Esign", dev: "Sunshine Insurance", status: "signed", url: "https://example.com" },
        { name: "GBox", dev: "Enterprise Ltd", status: "signed", url: "https://example.com" },
        { name: "TrollStore", dev: "Alfie CG", status: "revoked", url: "#" }
    ];

    let currentFilter = 'all';

    // --- ADMIN LOGIC ---
    let clicks = 0;
    document.getElementById('mainTitle').onclick = () => {
        clicks++;
        if(clicks === 5) {
            let pw = prompt("Enter Admin Key:");
            if(pw === "admin123") document.getElementById('adminArea').style.display = 'block';
        }
    };

    function genApp() {
        const obj = {
            name: document.getElementById('aName').value,
            dev: document.getElementById('aDev').value,
            status: document.getElementById('aStatus').value,
            url: document.getElementById('aLink').value
        };
        document.getElementById('jsonOutput').innerText = JSON.stringify(obj, null, 2) + ",";
    }

    // --- UI LOGIC ---
    function setFilter(el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        currentFilter = el.getAttribute('data-filter');
        updateUI();
    }

    function updateUI() {
        const query = document.getElementById('search').value.toLowerCase();
        const list = document.getElementById('appList');
        list.innerHTML = '';

        appData.filter(app => {
            const matchSearch = app.name.toLowerCase().includes(query);
            const matchTab = currentFilter === 'all' || app.status === currentFilter;
            return matchSearch && matchTab;
        }).forEach(app => {
            list.innerHTML += `
                <div class="app-card">
                    <div class="app-meta">
                        <div class="app-icon">${app.name[0]}</div>
                        <div class="info">
                            <span class="status status-${app.status}">${app.status}</span>
                            <b>${app.name}</b>
                            <span>${app.dev}</span>
                        </div>
                    </div>
                    <a href="${app.url}" class="get-btn">GET</a>
                </div>
            `;
        });
    }

    // Initial Render
    updateUI();
</script>
</body>
</html>
