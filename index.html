<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>foxtheleague | macOS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif; }
        
        body {
            background: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            overflow: hidden;
        }

        /* DISCLAIMER OVERLAY */
        #disclaimer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .disclaimer-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 450px;
        }

        .disclaimer-card h1 { font-size: 24px; margin-bottom: 15px; }
        .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 25px; }

        .btn {
            padding: 12px 30px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: transform 0.2s;
        }

        .btn-yes { background: #007aff; color: white; }
        .btn-nah { background: rgba(255, 255, 255, 0.2); color: white; }
        .btn:hover { transform: scale(1.05); }

        /* TOP BAR */
        .menu-bar {
            height: 28px; background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px); display: flex;
            justify-content: space-between; align-items: center;
            padding: 0 15px; color: white; font-size: 13px; z-index: 1000;
        }

        /* DESKTOP CONTENT */
        .desktop { height: 100vh; padding: 60px; display: flex; gap: 20px; flex-wrap: wrap; align-content: flex-start; }
        
        .window {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(30px);
            border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; overflow: hidden;
        }

        .title-bar { height: 35px; display: flex; align-items: center; padding: 0 12px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .dots { display: flex; gap: 7px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .close { background: #ff5f56; } .min { background: #ffbd2e; } .max { background: #27c93f; }

        /* PROFILE SECTION */
        .profile-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .user-img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid white; }

        /* SKILLS */
        .skill-row { margin-bottom: 12px; }
        .skill-label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; font-weight: 600; }
        .progress-bar { width: 100%; height: 7px; background: rgba(0,0,0,0.1); border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: #007aff; border-radius: 4px; }

        /* MINIGAMES GRID */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 10px; }
        .grid-item { text-align: center; color: #333; padding: 10px; border-radius: 8px; cursor: pointer; }
        .grid-item:hover { background: rgba(0,0,0,0.05); }
        .grid-item img { width: 45px; height: 45px; margin-bottom: 5px; }
        .grid-item span { font-size: 11px; font-weight: 500; display: block; }

        /* DOCK */
        .dock-ctn { position: fixed; bottom: 15px; width: 100%; display: flex; justify-content: center; }
        .dock { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(25px); padding: 10px; border-radius: 20px; display: flex; gap: 15px; }
        .dock img { width: 50px; transition: 0.2s; cursor: pointer; }
        .dock img:hover { transform: scale(1.3) translateY(-10px); }
    </style>
</head>
<body>

    <div id="disclaimer">
        <div class="disclaimer-card">
            <h1>Yo whats-fucking up!</h1>
            <p>This site is kinda trash rn but that’s alright! Do you want to enter?</p>
            <div class="btn-group">
                <button class="btn btn-yes" onclick="enterSite()">Yes</button>
                <button class="btn btn-nah" onclick="leaveSite()">Nah</button>
            </div>
        </div>
    </div>

    <div class="menu-bar">
        <div><span style="font-size: 16px;"></span> <b>Finder</b> File Edit View</div>
        <div id="clock">9:41 AM</div>
    </div>

    <div class="desktop">
        <div class="window" style="width: 320px;">
            <div class="title-bar">
                <div class="dots"><div class="dot close"></div><div class="dot min"></div><div class="dot max"></div></div>
            </div>
            <div style="padding: 20px;">
                <div class="profile-header">
                    <img src="image.png" class="user-img" alt="foxtheleague">
                    <div>
                        <h2 style="font-size: 20px;">foxtheleague</h2>
                        <p style="font-size: 11px; color: #666;">Developer</p>
                    </div>
                </div>
                <div class="skill-row"><div class="skill-label"><span>HTML/CSS</span><span>95%</span></div><div class="progress-bar"><div class="progress-fill" style="width: 95%;"></div></div></div>
                <div class="skill-row"><div class="skill-label"><span>JavaScript</span><span>80%</span></div><div class="progress-bar"><div class="progress-fill" style="width: 80%;"></div></div></div>
                <div class="skill-row"><div class="skill-label"><span>Python</span><span>70%</span></div><div class="progress-bar"><div class="progress-fill" style="width: 70%;"></div></div></div>
            </div>
        </div>

        <div class="window" style="width: 380px;">
            <div class="title-bar">
                <div class="dots"><div class="dot close"></div><div class="dot min"></div><div class="dot max"></div></div>
            </div>
            <div style="padding: 20px;">
                <h3 style="font-size: 14px; margin-bottom: 10px;">Minigames</h3>
                <div class="grid">
                    <div class="grid-item"><img src="https://cdn-icons-png.flaticon.com/512/3069/3069172.png"><span>Snake</span></div>
                    <div class="grid-item"><img src="https://cdn-icons-png.flaticon.com/512/5695/5695025.png"><span>Tetris</span></div>
                    <div class="grid-item"><img src="https://cdn-icons-png.flaticon.com/512/3295/3295284.png"><span>Runner</span></div>
                </div>

                <h3 style="font-size: 14px; margin: 25px 0 10px;">Projects</h3>
                <a href="https://rizzlerspaghetti.github.io/RoclothesV2/" target="_blank" style="text-decoration: none; color: inherit;">
                    <div style="display: flex; align-items: center; background: rgba(0,0,0,0.05); padding: 12px; border-radius: 10px;">
                        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968350.png" style="width: 30px; margin-right: 12px;">
                        <div>
                            <strong style="font-size: 13px;">RoclothesV2</strong>
                            <p style="font-size: 10px; color: #666;">View Live Site</p>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <div class="dock-ctn">
        <div class="dock">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c9/Finder_Icon_macOS_Big_Sur.png">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/ab/Apple_Photos_icon.png">
            <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png">
        </div>
    </div>

    <script>
        function enterSite() {
            document.getElementById('disclaimer').style.display = 'none';
        }
        function leaveSite() {
            window.location.href = "https://www.google.com";
        }
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }, 1000);
    </script>
</body>
</html>
