<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Managed App Store</title>
    <style>
        :root {
            --bg: #0b0e14;
            --card-bg: #161b22;
            --text: #ffffff;
            --text-dim: #8b949e;
            --ready: #238636;
            --revoked: #da3633;
            --accent: #2f81f7;
            --border: #30363d;
        }

        body { background-color: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .wrapper { width: 100%; max-width: 500px; }
        
        /* App Cards */
        .app-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .app-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .details b { display: block; font-size: 15px; }
        .badge { font-size: 9px; padding: 2px 5px; border-radius: 4px; text-transform: uppercase; font-weight: bold; margin-bottom: 3px; display: inline-block; }
        .status-ready { background: var(--ready); }
        .status-revoked { background: var(--revoked); }
        .btn-get { background: #21262d; color: var(--accent); text-decoration: none; padding: 6px 18px; border-radius: 15px; font-weight: bold; font-size: 13px; border: 1px solid var(--border); }

        /* Admin Panel - Hidden by default */
        #adminPanel { 
            display: none; 
            background: #1c2128; 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid var(--accent); 
            margin-bottom: 20px; 
        }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid var(--border); background: var(--bg); color: white; box-sizing: border-box; }
        .admin-btn { background: var(--accent); color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .secret-trigger { color: #0b0e14; cursor: default; user-select: none; font-size: 10px; }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <h1 onclick="checkAdmin()">Signed Apps</h1>
        <p class="subtitle">Click the title 5 times to enter Admin Mode.</p>
    </header>

    <div id="adminPanel">
        <h3>Add New App</h3>
        <input type="text" id="newName" placeholder="App Name">
        <input type="text" id="newDev" placeholder="Developer">
        <input type="text" id="newLink" placeholder="Redirect URL (https://...)">
        <select id="newStatus">
            <option value="ready">Ready</option>
            <option value="revoked">Revoked</option>
        </select>
        <button class="admin-btn" onclick="generateJSON()">Generate App Data</button>
        <p style="font-size: 10px; color: var(--text-dim);">Copy the code below and paste it into the 'apps' array in your file.</p>
        <code id="output" style="display:block; background: #000; padding: 10px; font-size: 10px; word-break: break-all;"></code>
    </div>

    <div class="app-list" id="appContainer"></div>
</div>

<script>
    // --- APP DATA SECTION ---
    // TO ADD APPS: Paste the generated code inside these brackets [ ]
    const apps = [
        { name: "Esign", dev: "Apple", status: "ready", link: "https://google.com" },
        { name: "TrollStore", dev: "Alfie", status: "revoked", link: "#" }
    ];

    // --- LOGIC ---
    let clickCount = 0;
    function checkAdmin() {
        clickCount++;
        if (clickCount === 5) {
            const code = prompt("Enter Secret Admin Key:");
            if (code === "1234") { // CHANGE THIS KEY
                document.getElementById('adminPanel').style.display = "block";
            }
        }
    }

    function generateJSON() {
        const app = {
            name: document.getElementById('newName').value,
            dev: document.getElementById('newDev').value,
            status: document.getElementById('newStatus').value,
            link: document.getElementById('newLink').value
        };
        document.getElementById('output').innerText = JSON.stringify(app) + ",";
    }

    function render() {
        const container = document.getElementById('appContainer');
        container.innerHTML = apps.map(app => `
            <div class="app-card">
                <div class="details">
                    <span class="badge status-${app.status}">${app.status}</span>
                    <b>${app.name}</b>
                    <span>${app.dev}</span>
                </div>
                <a href="${app.link}" class="btn-get" target="_blank">GET</a>
            </div>
        `).join('');
    }

    render();
</script>
</body>
</html>
