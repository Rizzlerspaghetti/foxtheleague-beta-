<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Varco App Store</title>
    
    <link rel="stylesheet" href="https://fastly.jsdelivr.net/npm/vant@3/lib/index.css" />
    <script src="https://fastly.jsdelivr.net/npm/vue@3"></script>
    <script src="https://fastly.jsdelivr.net/npm/vant@3/lib/vant.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Exact CSS Variables and Styling from the xyzarco/app Repo */
        :root {
            --van-blue: #007aff;
            --van-background-color-light: #f7f8fa;
        }
        
        body {
            background-color: var(--van-background-color-light);
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            user-select: none;
        }

        /* Navbar Customization */
        .van-nav-bar { background: var(--van-blue) !important; }
        .van-nav-bar__title { color: #fff !important; font-weight: 600; font-size: 17px; }

        /* App Card Layout */
        .app-card {
            background: #fff;
            margin: 12px 16px;
            padding: 16px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
            transition: transform 0.1s ease;
        }
        .app-card:active { transform: scale(0.98); background: #fafafa; }

        .app-icon {
            width: 62px;
            height: 62px;
            border-radius: 14px;
            object-fit: cover;
            margin-right: 14px;
            border: 0.5px solid rgba(0,0,0,0.1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .app-info { flex: 1; min-width: 0; }
        .app-name { font-size: 16px; font-weight: 700; color: #1a1a1a; margin-bottom: 2px; }
        .app-version { font-size: 12px; color: #8e8e93; margin-bottom: 4px; }

        /* Status Tags */
        .status-tag {
            font-size: 10px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
            text-transform: uppercase;
        }
        .status-ready { background: #e8f9f0; color: #07c160; }
        .status-revoked { background: #fff1f0; color: #f5222d; }

        /* Install Button */
        .btn-install {
            background: #f0f0f7;
            color: var(--van-blue);
            border: none;
            padding: 6px 18px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 13px;
            min-width: 70px;
            text-align: center;
        }
        .btn-install:active { background: var(--van-blue); color: #fff; }

        /* Tabbar Customization */
        .van-tabbar-item--active { color: var(--van-blue) !important; }
    </style>
</head>
<body>

<div id="app">
    <van-nav-bar :title="t('title')" fixed placeholder border="false"></van-nav-bar>

    <van-tabs v-model:active="currentLang" @change="onLangChange" sticky offset-top="46" color="#007aff">
        <van-tab title="English" name="en"></van-tab>
        <van-tab title="Indonesia" name="id"></van-tab>
    </van-tabs>

    <van-search 
        v-model="searchValue" 
        :placeholder="t('searchPlaceholder')" 
        shape="round"
        background="transparent"
    ></van-search>

    <van-pull-refresh v-model="refreshing" @refresh="onRefresh">
        <div class="pb-24">
            <template v-for="app in filteredApps" :key="app.name">
                <div class="app-card" @click="handleInstall(app)">
                    <img :src="app.icon" class="app-icon" @error="onIconError">
                    
                    <div class="app-info">
                        <div class="app-name truncate">{{ app.name }}</div>
                        <div class="app-version text-xs">v{{ app.version || '1.0.0' }}</div>
                        <div class="mt-1">
                            <span :class="app.status === 'Ready' ? 'status-ready' : 'status-revoked'" class="status-tag">
                                {{ app.status }}
                            </span>
                        </div>
                    </div>

                    <button class="btn-install" @click.stop="handleInstall(app)">
                        {{ t('get') }}
                    </button>
                </div>
            </template>

            <van-empty v-if="apps.length === 0 && !loading" :description="t('noApps')" />
            <div v-if="loading" class="flex justify-center p-10"><van-loading color="#007aff" /></div>
        </div>
    </van-pull-refresh>

    <van-tabbar v-model="activeNav" placeholder border shadow>
        <van-tabbar-item icon="apps-o">{{ t('navApps') }}</van-tabbar-item>
        <van-tabbar-item icon="info-o" @click="showAbout">{{ t('navInfo') }}</van-tabbar-item>
    </van-tabbar>
</div>

<script>
const { createApp, ref, computed, onMounted } = Vue;

createApp({
    setup() {
        const currentLang = ref('en');
        const searchValue = ref('');
        const activeNav = ref(0);
        const refreshing = ref(false);
        const loading = ref(true);
        const apps = ref([]);

        // Dictionary to match the 'xyzarco/app' translation logic
        const i18n = {
            en: {
                title: 'Varco App Store',
                searchPlaceholder: 'Search apps...',
                get: 'GET',
                noApps: 'No applications found',
                navApps: 'Apps',
                navInfo: 'Info',
                installTitle: 'Installation',
                installMsg: 'Do you want to install this application?'
            },
            id: {
                title: 'Toko Aplikasi Varco',
                searchPlaceholder: 'Cari aplikasi...',
                get: 'DAPAT',
                noApps: 'Aplikasi tidak ditemukan',
                navApps: 'Aplikasi',
                navInfo: 'Info',
                installTitle: 'Instalasi',
                installMsg: 'Apakah Anda ingin menginstal aplikasi ini?'
            }
        };

        const t = (key) => i18n[currentLang.value][key];

        // Fetching real data from the xyzarco production endpoint
        const fetchApps = async () => {
            loading.value = true;
            try {
                const response = await fetch('https://xyzarco.github.io/app/static/json/apps.json');
                apps.value = await response.json();
            } catch (error) {
                vant.Notify({ type: 'danger', message: 'Data sync failed' });
            } finally {
                loading.value = false;
            }
        };

        const filteredApps = computed(() => {
            return apps.value.filter(app => 
                app.name.toLowerCase().includes(searchValue.value.toLowerCase())
            );
        });

        const handleInstall = (app) => {
            if (app.status !== 'Ready') {
                return vant.Dialog.alert({ title: 'Notice', message: 'App is Revoked' });
            }

            vant.Dialog.confirm({
                title: t('installTitle'),
                message: t('installMsg'),
                confirmButtonColor: '#007aff'
            }).then(() => {
                // Pointing to the plist repository as requested
                // itms-services protocol is mandatory for iOS sideloading
                const manifestUrl = app.link.startsWith('http') 
                    ? app.link 
                    : `https://xyzarco.github.io/plist/plists/${app.link}`;
                
                window.location.href = `itms-services://?action=download-manifest&url=${manifestUrl}`;
            }).catch(() => {});
        };

        const onRefresh = async () => {
            await fetchApps();
            refreshing.value = false;
        };

        const onIconError = (e) => {
            e.target.src = 'https://xyzarco.github.io/app/static/img/logo.png';
        };

        const showAbout = () => {
            vant.Dialog.alert({ title: 'About', message: 'Varco v1.0.0\nDistributed via GitHub Pages' });
        };

        onMounted(fetchApps);

        return {
            currentLang, searchValue, activeNav, refreshing, loading, apps,
            filteredApps, t, handleInstall, onRefresh, onIconError, showAbout
        };
    }
}).use(vant).mount('#app');
</script>

</body>
</html>
