<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="profile">
                <h2>My Name</h2>
                <p>Developer & Creator</p>
            </div>
            <nav>
                <ul>
                    <li><a href="#about">About</a></li>
                    <li><a href="#projects">Projects</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>
            <button id="theme-toggle">Toggle Theme</button>
        </aside>

        <main class="content">
            <section id="about">
                <h1>About Me</h1>
                <p>This is a remake of the app layout. It is lightweight, fast, and hosts perfectly on GitHub.</p>
            </section>

            <section id="projects">
                <h1>Projects</h1>
                <div class="card">
                    <h3>Project One</h3>
                    <p>Description of your awesome work goes here.</p>
                </div>
            </section>
        </main>
    </div>

    <script>
        const btn = document.getElementById('theme-toggle');
        btn.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
        });
    </script>
</body>
</html>
